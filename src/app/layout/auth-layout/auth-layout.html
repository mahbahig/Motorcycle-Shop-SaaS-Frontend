<!-- Background layers -->
<div class="moto-img fixed inset-0 z-0" aria-hidden="true"></div>
<div class="moto-overlay" aria-hidden="true"></div>

<div
  class="relative z-10 min-h-screen flex flex-col md:flex-row items-center justify-center md:justify-between gap-8 md:gap-4 px-5 sm:px-10 md:px-14 lg:px-24 py-10 md:py-0"
>
  <!-- ── Desktop brand block (md+) ── -->
  <div class="md:flex flex-col flex-1 max-w-lg a1">
    <h1
      class="font-display text-(--color-text-base) leading-none uppercase"
      style="font-size: clamp(2.8rem, 5.5vw, 5.8rem); font-weight: 900; letter-spacing: -0.01em"
    >
      نظام تشغيل
    </h1>
    <p class="mt-5 tagline font-body font-semibold tracking-widest text-xl lg:text-xl uppercase a2">
      مكن و اتركن
    </p>
  </div>

  <!-- ═══ LOGIN PANEL ═══ -->
  <div class="w-full max-w-[92vw] sm:max-w-sm md:max-w-100 lg:max-w-110 a3">
    <div class="panel-card w-full rounded-2xl p-6 sm:p-9 lg:p-10">
      <div class="flex items-center justify-center w-full mb-5">
        <div class="flex items-center gap-3">
          <div class="accent-line-b"></div>
          <button id="login-theme-btn" class="login-theme-btn" aria-label="Toggle theme">
            <!-- Font Awesome: fa-moon / fa-sun -->
            <i id="login-moon-icon" class="fa-solid fa-moon"></i>
            <i id="login-sun-icon" class="fa-solid fa-sun" style="display: none"></i>
            <span id="login-theme-label">Dark</span>
          </button>
          <div class="accent-line-a"></div>
        </div>
      </div>

      <!-- Card heading -->

      <h2 class="form-label text-center font-body text-lg mb-7">تسجيل الدخول</h2>
      <form (ngSubmit)="loginSubmit()" [formGroup]="loginForm">
        <div class="mb-5">
          <label
            for="username"
            class="block mb-2 form-label font-body text-md tracking-widest uppercase"
          >
            اسم المستخدم
          </label>
          <div class="relative">
            <app-input
              [idInput]="'username'"
              [placeholderInput]="'احمد محمد'"
              [typeInput]="'text'"
              [control]="loginForm.get('username')"
            ></app-input>
          </div>
        </div>

        <div class="mb-8">
          <label
            for="password"
            class="block mb-2 form-label font-body text-md tracking-widest uppercase"
          >
            كلمة المرور
          </label>
          <div class="relative">
            <app-input
              [idInput]="'password'"
              [placeholderInput]="'••••••••••'"
              [control]="loginForm.get('password')"
            ></app-input>
          </div>
        </div>
        <div
          class="mb-8 opacity-0"
          [class]="{ 'opacity-100': (username?.invalid || password?.invalid) && clicked() }"
        >
          <div class="relative">
            <h2
              class="block mb-2 form-label font-body text-md text-center tracking-widest uppercase text-red-400!"
            >
              <i class="fa-solid fa-circle-exclamation text-red-400 me-1"></i>{{ errorMessage() }}
            </h2>
          </div>
        </div>

        <button
          type="submit"
          class="ignite-btn w-full py-3.5 rounded-lg font-display font-bold text-lg lg:text-base tracking-widest uppercase flex items-center justify-center gap-2"
        >
          <!-- Font Awesome: fa-bolt -->
          <i class="fa-solid fa-bolt"></i>
          استمر
        </button>
      </form>
    </div>
  </div>
  <!-- end login panel -->
</div>
