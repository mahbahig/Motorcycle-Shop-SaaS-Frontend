<!-- Background layers -->
  <div class="moto-img fixed inset-0 z-0" aria-hidden="true"></div>
  <div class="moto-overlay" aria-hidden="true"></div>

  <!-- ═══ LAYOUT WRAPPER ═══ -->
  <!--
    Mobile  (<768px) : single column, brand above card, full-width panel
    Tablet  (768px+) : two-column split, brand left / panel right
    Desktop (1024px+): same with extra horizontal padding
  -->
  <div class="relative z-10 min-h-screen
              flex flex-col md:flex-row
              items-center justify-center md:justify-between
              gap-8 md:gap-4
              px-5 sm:px-10 md:px-14 lg:px-24
              py-10 md:py-0">

    <!-- ── Desktop brand block (md+) ── -->
    <div class="hidden md:flex flex-col flex-1 max-w-lg a1">
      <h1 class="font-display text-[var(--color-text-base)] leading-none uppercase"
          style="font-size:clamp(2.8rem,5.5vw,5.8rem);font-weight:900;letter-spacing:-0.01em;">
        نظام تشغيل<br>MOTORCO
      </h1>
      <p class="mt-5 tagline font-body font-semibold tracking-widest text-xl lg:text-xl uppercase a2">
        .دراجتك، شغفنا


      </p>
    </div>

    <!-- ── Mobile brand strip (above card) ── -->
    <div class="flex flex-col items-center md:hidden text-center a1">
      <h1 class="font-display text-[var(--color-text-base)] leading-none uppercase"
          style="font-size:clamp(2.2rem,12vw,3.4rem);font-weight:900;">
        نظام تشغيل<br>MOTORCO
      </h1>
      <p class="mt-2 tagline font-body font-semibold tracking-widest text-xs uppercase">
        .دراجتك، شغفنا
      </p>
    </div>

    <!-- ═══ LOGIN PANEL ═══ -->
    <div class="w-full max-w-[92vw] sm:max-w-sm md:max-w-100 lg:max-w-110 a3">
      <div class="panel-card rounded-2xl p-6 sm:p-9 lg:p-10">

        <!-- Panel top row: accent line + theme toggle -->
        <div class="flex items-center justify-between mb-5">
          <div></div><!-- spacer -->
          <!-- Theme toggle button (Flowbite: Button – https://flowbite.com/docs/components/buttons/) -->
          <div class="flex items-center gap-3">
            <button id="login-theme-btn" onclick="toggleTheme()"
              class="login-theme-btn" aria-label="Toggle theme">
              <!-- Font Awesome: fa-moon / fa-sun -->
              <i id="login-moon-icon" class="fa-solid fa-moon"></i>
              <i id="login-sun-icon"  class="fa-solid fa-sun" style="display:none;"></i>
              <span id="login-theme-label">Dark</span>
            </button>
            <div class="accent-line"></div>
          </div>
        </div>

        <!-- Card heading -->
        <h2 class="font-display font-extrabold text-[var(--color-text-base)] uppercase tracking-wide
                   text-2xl sm:text-3xl mb-1">
          Access Portal
        </h2>
        <p class="form-label font-body text-lg mb-7">
          .أدخل بيانات اعتمادك للمتابعة

        </p>

        <!-- ── Flowbite: Input Field with left icon (Email) ──
             https://flowbite.com/docs/forms/input-field/#input-with-icon -->
        <div class="mb-5">
          <!-- Flowbite: Label – https://flowbite.com/docs/forms/input-field/#label -->
          <label for="email"
            class="block mb-2 form-label font-body text-md tracking-widest uppercase">
            رقم التليفون
          </label>
          <div class="relative">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5">
              <!-- Font Awesome: fa-user -->
              <i class="fa-regular fa-user input-icon text-sm"></i>
            </div>
            <input id="phoneNumber" type="number" placeholder="011 2345 6789"
              class="kp-input block w-full pl-10 pr-4 py-3 rounded-lg font-body text-sm" />
          </div>
        </div>

        <!-- ── Flowbite: Input Field with left icon (Password) ──
             https://flowbite.com/docs/forms/input-field/#input-with-icon -->
        <div class="mb-8">
          <!-- Flowbite: Label – https://flowbite.com/docs/forms/input-field/#label -->
          <label for="password"
            class="block mb-2 form-label font-body text-md tracking-widest uppercase">
            كلمة المرور
          </label>
          <div class="relative">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5">
              <!-- Font Awesome: fa-lock -->
              <i class="fa-solid fa-lock input-icon text-sm"></i>
            </div>
            <input id="password" type="password" placeholder="••••••••••"
              class="kp-input block w-full pl-10 pr-4 py-3 rounded-lg font-body text-sm tracking-widest" />
          </div>
        </div>

        <!-- ── Flowbite: Button ──
             https://flowbite.com/docs/components/buttons/ -->
        <button type="button"
          onclick="window.location.href='dashboard.html'"
          class="ignite-btn w-full py-3.5 rounded-lg font-display font-bold
                 text-lg lg:text-base tracking-widest uppercase
                 flex items-center justify-center gap-2">
          <!-- Font Awesome: fa-bolt -->
          <i class="fa-solid fa-bolt"></i>
          استمر
        </button>



      </div>
    </div>
    <!-- end login panel -->

  </div>
