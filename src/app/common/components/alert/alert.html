<div
  id="errorMsg"
  class="flex items-center gap-3 px-4 py-3 rounded-xl border"
  [class]="
    (isSuccess()
      ? 'bg-green-50 border-green-200 dark:bg-green-950/40 dark:border-green-800 '
      : 'bg-red-50 border-red-200 dark:bg-red-950/40 dark:border-red-800 ') +
    (hasError() ? 'opacity-100' : 'opacity-0')
  "
>
  @if (isSuccess()) {
    <i class="fa-regular fa-circle-check text-green-500"></i>
  } @else {
    <i class="fa-solid fa-circle-exclamation w-5 h-5 text-red-500 shrink-0 my-0 py-0"></i>
  }
  <p
    class="text-sm font-tajawal mt-0 mb-1.5 py-0"
    [class]="isSuccess() ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'"
  >
    {{ message() }}
  </p>
</div>
