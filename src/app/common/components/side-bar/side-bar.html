<aside
  [class]="sidebarHidden()?'hidden':'flex'"
  class="fixed top-0 right-0 h-full w-64 bg-navy-900 dark:bg-gray-900 z-40 lg:flex flex-col shadow-2xl overflow-hidden">

  <!-- Decorative gear in sidebar -->
  <div class="absolute -bottom-10 -left-10 opacity-[0.06] pointer-events-none gear-anim">
    <i class="fa-solid fa-gear text-white text-[180px]"></i>
  </div>

  <!-- Logo row -->
  <div class="flex items-center gap-3 px-5 py-[13.5px] border-b border-white/10">
    <div class="w-9 h-9 rounded-xl bg-white/10 border border-white/20 flex items-center justify-center shrink-0">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z"/>
      </svg>
    </div>
    <div>
      <p class="text-white font-bold text-sm leading-tight">{{ userProfile()?.shop?.slug }}</p>
      <p class="text-white/40 text-xs" style="font-family:'Tajawal',sans-serif">لوحة التحكم</p>
    </div>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <p class="text-white/30 text-2xs uppercase tracking-widest px-3 mb-2" style="letter-spacing:.15em">القائمة الرئيسية</p>

    @for (page of pages; track page) {
      <a  class="nav- cursor-pointer flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-white/70 hover:text-white">
        <i [class]="page.icon" class="w-5 h-5 shrink-0"></i>
        <span>{{ page.name }}</span>
      </a>
    }

    <div class="pt-3">
      <p class="text-white/30 text-2xs uppercase tracking-widest px-3 mb-2" style="letter-spacing:.15em">التقارير</p>
    </div>

    <a  class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-white/70 hover:text-white">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
      <span>تقارير الأداء</span>
    </a>

    <a  class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-white/70 hover:text-white">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z"/><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z"/></svg>
      <span>إحصائيات</span>
    </a>
  </nav>

  <!-- User row -->
  <div class="px-4 py-4 border-t border-white/10 flex items-center gap-3">
    <div class="w-8 h-8 rounded-full bg-navy-600 flex items-center justify-center text-white text-xs font-bold shrink-0">أح</div>
    <div class="flex-1 min-w-0">
      <p class="text-white text-xs font-semibold truncate">{{ userProfile()?.username }}</p>
      <p class="text-white/40 text-[11px]" style="font-family:'Tajawal',sans-serif">{{ userProfile()?.role }}</p>
    </div>
    <button (click)="logout()" class="text-white/40 hover:text-white transition-colors cursor-pointer" title="تسجيل الخروج">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
    </button>
  </div>
</aside>
