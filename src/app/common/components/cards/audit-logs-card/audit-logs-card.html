<app-main-card>
  <div class="flex justify-between px-5 pt-5 pb-4">
    <h3 class="font-bold text-navy-900 dark:text-white text-sm mb-4">آخر النشاطات</h3>
    <app-button [buttonStyle]="btnStyle.anchor" message="عرض الكل ←"></app-button>
  </div>
  <div class="space-y-4">
    <div class="flex gap-3">
      <div
        class="w-8 h-8 rounded-full bg-green-50 dark:bg-green-950/30 flex items-center justify-center shrink-0"
      >
        <svg
          class="w-4 h-4 text-green-600 dark:text-green-400"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-navy-800 dark:text-gray-200 font-tajawal">
          اكتمل أمر الشغل #1042
        </p>
        <p class="text-[11px] text-navy-400 dark:text-gray-600 mt-0.5 font-tajawal">منذ 10 دقائق</p>
      </div>
    </div>

    <div class="flex gap-3">
      <div
        class="w-8 h-8 rounded-full bg-navy-50 dark:bg-navy-950/50 flex items-center justify-center shrink-0"
      >
        <svg
          class="w-4 h-4 text-navy-700 dark:text-navy-300"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3M6.75 21a6.75 6.75 0 110-13.5 6.75 6.75 0 010 13.5z"
          />
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-navy-800 dark:text-gray-200 font-tajawal">
          عميل جديد: نورة السبيعي
        </p>
        <p class="text-[11px] text-navy-400 dark:text-gray-600 mt-0.5 font-tajawal">منذ 35 دقيقة</p>
      </div>
    </div>

    <div class="flex gap-3">
      <div
        class="w-8 h-8 rounded-full bg-yellow-50 dark:bg-yellow-950/30 flex items-center justify-center shrink-0"
      >
        <svg
          class="w-4 h-4 text-yellow-600 dark:text-yellow-400"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
          />
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-navy-800 dark:text-gray-200 font-tajawal">
          مخزون منخفض: فلتر هواء
        </p>
        <p class="text-[11px] text-navy-400 dark:text-gray-600 mt-0.5 font-tajawal">منذ ساعة</p>
      </div>
    </div>

    <div class="flex gap-3">
      <div
        class="w-8 h-8 rounded-full bg-navy-50 dark:bg-navy-950/50 flex items-center justify-center shrink-0"
      >
        <svg
          class="w-4 h-4 text-navy-700 dark:text-navy-300"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"
          />
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-navy-800 dark:text-gray-200 font-tajawal">
          فاتورة #892 أُصدرت
        </p>
        <p class="text-[11px] text-navy-400 dark:text-gray-600 mt-0.5 font-tajawal">منذ ساعتين</p>
      </div>
    </div>
  </div>
</app-main-card>
