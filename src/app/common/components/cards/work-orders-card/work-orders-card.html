<app-main-card class="overflow-hidden">
  <div class="flex items-center justify-between px-5 pt-5 pb-4 border-b border-navy-50 dark:border-gray-800">
    <h3 class="font-bold text-navy-900 dark:text-white text-sm">أحدث أوامر الشغل</h3>
    <button class="text-xs font-semibold text-navy-700 transition-colors hover:text-navy-900 dark:text-navy-300 dark:hover:text-white font-tajawal"> عرض الكل ← </button>
  </div>

  <div class="scrollbar">

    <table class="w-full text-sm">
      <thead class="sticky top-0 bg-white dark:bg-gray-900 z-10 shadow-[0_1px_0_0_rgba(0,0,0,0.05)] dark:shadow-[0_1px_0_0_rgba(255,255,255,0.05)]">
      <tr class="border-b border-navy-50 dark:border-gray-800">
        @for (th of tableHeaders;track $index){
          <th class="text-right px-5 py-3 text-xs font-semibold text-navy-400 dark:text-gray-500 font-tajawal"> {{th}} </th>
        }
      </tr>
      </thead>
      <tbody class="divide-y divide-navy-50 dark:divide-gray-800">
        @for (order of orders; track $index){
          <tr class="hover:bg-navy-50/50 dark:hover:bg-gray-800/50 transition-colors">
            <td class="px-5 py-3.5 text-xs text-navy-400 dark:text-gray-600 font-mono">{{order.id}}</td>
            <td class="px-3 py-3.5">
              <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full bg-navy-900 dark:bg-navy-700 flex items-center justify-center text-white text-2xs font-bold shrink-0">
                  {{ order.customer.split('',2).join('') }}
                </div>
                <span class="font-tajawal text-xs font-medium text-navy-800 dark:text-gray-200">{{order.customer }}</span>
              </div>
            </td>
            <td class="px-3 py-3.5 text-xs text-navy-600 dark:text-gray-400 font-tajawal"> {{order.car}} </td>
            <td class="px-3 py-3.5 text-xs text-navy-600 dark:text-gray-400 font-tajawal"> {{order.service}} </td>
            <td class="px-3 py-3.5">
              <span [class]="(order.status=='مكتمل'?'bg-green-100 text-green-800 dark:bg-green-600/20 dark:text-green-300': order.status=='معلق'?'bg-yellow-100 text-yellow-800 dark:bg-yellow-600/20 dark:text-yellow-300': 'bg-blue-100 text-blue-800 dark:bg-blue-900/25 dark:text-blue-300')" class="rounded-full px-2.5 py-1 text-2xs font-semibold font-tajawal">{{order.status}}</span>
            </td>
            <td class="px-5 py-3.5 text-xs font-bold text-navy-900 dark:text-white font-tajawal"> {{order.amount}} </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</app-main-card>
