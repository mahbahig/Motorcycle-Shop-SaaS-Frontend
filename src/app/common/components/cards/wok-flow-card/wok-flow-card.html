<app-main-card
>
  <div class="flex items-start justify-between mb-4">
    <div
      class="w-10 h-10 rounded-xl bg-navy-50 dark:bg-navy-950 flex items-center justify-center"
    >
      <svg
        class="w-5 h-5 text-navy-700 dark:text-navy-300"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          [attr.d]=path_d()
        />
      </svg>
    </div>
    <span
      class="rounded-2xl bg-green-50 px-2 py-0.5 text-xs font-medium text-green-600 dark:bg-green-950/40 dark:text-green-400"
    >+{{percentage()}}%</span
    >
  </div>
  <p class="text-2xl font-bold text-navy-900 dark:text-white">{{ number() }}
    @if(price()){
      <span class="text-base font-medium text-navy-400 dark:text-gray-500">ر.س</span>

    }
  </p>
  <p class="mt-1 text-sm text-navy-400 dark:text-gray-50 font-tajawal">{{ description() }}</p>
</app-main-card>
