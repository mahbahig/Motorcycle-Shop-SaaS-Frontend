<header class="sticky top-0 left-0 right-0  z-20 bg-white dark:bg-gray-950 backdrop-blur-md border-b border-navy-100 dark:border-gray-800 px-4 lg:px-7 h-16 flex items-center gap-4">
  <!-- Mobile hamburger -->
  <button (click)="openSidebar()" class="lg:hidden p-2 rounded-lg text-navy-500 dark:text-gray-400 hover:bg-navy-50 dark:hover:bg-gray-800 transition-colors">
    <i class="fa-solid fa-bars w-5 h-5"></i>
  </button>

  <!-- Page title -->
  <div class="flex-1 ">
    <h1 class="text-base font-bold text-navy-900 dark:text-white">لوحة التحكم</h1>
    <p class="text-xs text-navy-400 dark:text-gray-500 block font-tajawal">{{ dateAr() }}</p>
  </div>

    <!-- Theme toggle -->
  <button onclick="document.documentElement.classList.toggle('dark')"
    class="w-9 h-9 rounded-xl bg-navy-50 dark:bg-gray-900 border border-navy-100 dark:border-gray-800 flex items-center justify-center text-navy-500 dark:text-gray-400 hover:bg-navy-100 dark:hover:bg-gray-800 transition-colors" aria-label="تبديل المظهر">
    <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>

</header>
