<div
  class="mb-6 text-center transition-opacity duration-300"
  [class]="{
    'text-green-700!': isSuccess(),
    'text-red-700!': !isSuccess(),
    'opacity-0': !hasError(),
    'opacity-100': hasError(),
  }"
>
  <span class="text-error text-sm font-bold tracking-widest uppercase">
    <i class="fa-solid fa-circle-exclamation me-1"></i>{{ message() }}
  </span>
</div>
