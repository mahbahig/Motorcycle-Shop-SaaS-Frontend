<div class="w-full flex items-center justify-center px-6 py-16 bg-white dark:bg-gray-950">
  <div class="w-full max-w-md animate-[fadeUp_0.7s_cubic-bezier(0.22,0.68,0,1.2)_both]">
    <!-- Mobile logo (shown only on small screens) -->
    <div class="lg:hidden flex justify-center mb-10">
      <div
        class="w-14 h-14 rounded-xl bg-navy-900 dark:bg-navy-800 flex items-center justify-center"
      >
        <svg
          class="w-7 h-7 text-white"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z"
          />
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <div class="mb-10">
      <p
        class="mb-2 text-sm font-medium uppercase text-navy-400 dark:text-gray-500 font-tajawal tracking-[0.2em]"
      >
        مرحباً بعودتك
      </p>
      <h2 class="text-3xl font-bold text-navy-900 dark:text-white font-cairo">تسجيل الدخول</h2>
      <p class="mt-2 text-navy-400 dark:text-gray-400 text-base font-light font-tajawal">
        أدخل بياناتك للمتابعة إلى لوحة التحكم
      </p>
    </div>

    <!-- Thin accent line -->
    <div class="w-12 h-0.5 bg-navy-800 dark:bg-navy-400 mb-10 rounded-full"></div>

    <!-- Form -->
    <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="loginSubmit()">
      <!-- Username -->
      <app-input
        [control]="username"
        label="اسم المستخدم"
        placeholderInput="أدخل اسم المستخدم"
        idInput="username"
        nameInput="username"
      ></app-input>
      <!-- Password -->
      <app-input
        [control]="password"
        label="كلمة المرور"
        placeholderInput="أدخل كلمة المرور"
        idInput="password"
        nameInput="password"
      ></app-input>
      <!-- Remember me -->
      <div class="flex items-center gap-3">
        <div class="relative flex items-center">
          <input
            formControlName="rememberMe"
            id="rememberMe"
            type="checkbox"
            class="w-5 h-5 rounded border-2 border-navy-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-navy-800 dark:text-navy-400 accent-navy-700 cursor-pointer transition-all duration-150 focus:ring-2 focus:ring-navy-200 dark:focus:ring-navy-800 checked:bg-navy-800 checked:border-navy-800 dark:checked:bg-navy-500 dark:checked:border-navy-500"
          />
        </div>
        <label
          for="rememberMe"
          class="text-sm text-navy-600 dark:text-gray-400 cursor-pointer select-none font-tajawal"
        >
          تذكّرني على هذا الجهاز
        </label>
      </div>
      <!-- Submit -->
      <app-button type="submit" [isLoading]="isLoading()" message="دخول إلى المنصة">
        <i icon
          [class.hidden!]="isLoading()"
          class="fa-solid  fa-arrow-left w-5 h-5 transition-transform duration-200 translate-y-1 group-hover:-translate-x-1"></i>
      </app-button>

      <app-alert
        [hasError]="hasError()"
        [message]="errorMessage()"
        [isSuccess]="isSuccess()"
      ></app-alert>
    </form>

    <!-- Bottom subtle branding line -->
    <div class="mt-14 pt-6 border-t border-navy-100 dark:border-gray-800">
      <p class="text-center text-xs text-navy-300 dark:text-gray-600 font-tajawal">
        تم تطوير وتصميم هذا الموقع بواسطة محمود بهيج
      </p>
      <p class="text-center text-xs text-navy-300 dark:text-gray-600 font-tajawal">
        جميع الحقوق محفوظة &copy; {{ currentYear() }}
      </p>
    </div>
  </div>
</div>
