<main class="flex-1 px-4 lg:px-4 py-6 space-y-6">
  <!-- ── GREETING BANNER ── -->
  <div
    class="relative rounded-2xl bg-navy-900 px-7 py-6 overflow-hidden dark:bg-main-dark animate-[fadeUp_0.7s_cubic-bezier(0.22,0.68,0,1.2)_both]"
  >
    <!-- Gear deco -->
    <div class="absolute -left-8 -top-8 opacity-[0.07] gear-anim pointer-events-none">
      <i class="fa-solid fa-gear text-white text-[160px]"></i>
    </div>

    <!-- text -->
    <div class="relative z-10 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div>
        <p class="mb-1 text-sm text-white/50 font-tajawal">مرحباً بعودتك،</p>
        <h2 class="text-white text-2xl font-bold">أحمد الشمري 👋</h2>
        <p class="mt-1 text-sm text-white/60 font-tajawal">
          لديك
          <span class="text-white font-semibold">5 أوامر شغل</span> مفتوحة اليوم
        </p>
      </div>
      <app-button
        [btn_white]="true"
        message="أمر شغل جديد"
      >
        <svg icon class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
      </app-button>

    </div>
  </div>
  <!-- ── STAT CARDS ── -->
  <div
    class="grid grid-cols-2 gap-4 lg:grid-cols-2 animate-[fadeUp_0.7s_cubic-bezier(0.22,0.68,0,1.2)_both] [animation-delay:0.05s]"
  >
    <!-- Card 1 -->
    <app-wok-flow-card></app-wok-flow-card>

    <!-- Card 2 -->
    <app-wok-flow-card [price]="true" description="الإيرادات هذا الشهر" percentage="12" number="18,450"
                       path_d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342
                       1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125
                        1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504
                         1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0
                         0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15
                         10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"
    ></app-wok-flow-card>

  </div>
  <!-- ── BOTTOM ROW: Work Orders Table + Recent Activity ── -->
  <div
    class="grid grid-cols-1 gap-4 lg:grid-cols-3 animate-[fadeUp_0.7s_cubic-bezier(0.22,0.68,0,1.2)_both] [animation-delay:0.15s]"
  >
    <!-- Work Orders Table -->
    <div class="self-start lg:col-span-2">
      <app-work-orders-card></app-work-orders-card>
    </div>
    <!-- Recent Activity + Low Stock -->
    <div class="flex flex-col gap-4">
      <!-- Activity Feed -->
      <app-audit-logs-card></app-audit-logs-card>
      <!-- Low Stock Alert -->
      <app-storage-alert-card></app-storage-alert-card>
    </div>
  </div>
</main>
